# Forces the uinput kernel module to load early at boot (via
# systemd-modules-load.service, part of sysinit.target) instead of being
# loaded reactively whenever something first tries to open /dev/uinput.
#
# That reactive loading is what hud_cursor_fix.py hit on a cold boot: the
# module loaded on first access, but a race between the module load and
# udev applying 99-uinput.rules left /dev/uinput briefly root-only,
# failing the cursor fix. Loading it explicitly this way gives udev time
# to apply the rule long before atlas-hud.service ever starts.
#
# Install:
#   sudo cp systemd/uinput.conf /etc/modules-load.d/
#
# Takes effect on the next boot (systemd-modules-load.service only runs
# once, early in the boot sequence) — `sudo modprobe uinput` loads it
# immediately without rebooting.
uinput
